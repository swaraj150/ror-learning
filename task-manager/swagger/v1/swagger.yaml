---
openapi: 3.0.1
info:
  title: Task Manager API
  version: v1
  description: API for managing tasks with authentication
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - todo
          - in_progress
          - completed
        priority:
          type: string
          enum:
          - low
          - medium
          - high
        due_date:
          type: string
          format: date
        overdue:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
          - user
          - admin
        task_count:
          type: integer
          readOnly: true
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        status:
          type: integer
        details:
          type: string
security:
- bearerAuth: []
paths:
  "/users":
    post:
      summary: Register a new user
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/User"
                  token:
                    type: string
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    name:
                      type: string
                      example: John Doe
                    email:
                      type: string
                      example: john@example.com
                    password:
                      type: string
                      example: password123
                    password_confirmation:
                      type: string
                      example: password123
                  required:
                  - name
                  - email
                  - password
                  - password_confirmation
  "/users/sign_in":
    post:
      summary: Login
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/User"
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: john@example.com
                    password:
                      type: string
                      example: password123
                  required:
                  - email
                  - password
  "/tasks":
    get:
      summary: List all tasks
      tags:
      - Tasks
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        description: Filter by status
        schema:
          type: string
      - name: priority
        in: query
        required: false
        description: Filter by priority
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: Tasks retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Task"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a task
      tags:
      - Tasks
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: object
                  properties:
                    title:
                      type: string
                      example: Complete Rails project
                    description:
                      type: string
                      example: Finish the API
                    status:
                      type: string
                      example: todo
                    priority:
                      type: string
                      example: high
                    due_date:
                      type: string
                      example: '2026-04-01'
                  required:
                  - title
  "/tasks/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get a task
      tags:
      - Tasks
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update a task
      tags:
      - Tasks
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: object
                  properties:
                    title:
                      type: string
                    status:
                      type: string
                    priority:
                      type: string
    delete:
      summary: Delete a task
      tags:
      - Tasks
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Task deleted
servers:
- url: http://localhost:3000
  description: Development
- url: https://task-manager-api-xoa6.onrender.com
  description: Production
