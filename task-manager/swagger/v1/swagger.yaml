---
openapi: 3.0.1
info:
  title: Task Manager API
  version: v1
  description: API for managing tasks with authentication
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - todo
          - in_progress
          - completed
        priority:
          type: string
          enum:
          - low
          - medium
          - high
        due_date:
          type: string
          format: date
        overdue:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
          - user
          - admin
        task_count:
          type: integer
          readOnly: true
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        status:
          type: integer
        details:
          type: string
security:
- bearerAuth: []
paths: {}
servers:
- url: http://localhost:3000
  description: Development
- url: https://task-manager-api-xoa6.onrender.com
  description: Production
